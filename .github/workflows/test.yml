name: tester

on:
  pull_request:
  push:
    branches:
      - "*"

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Install ImageMagick and libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libvips-dev
      - name: Run tests
        run: |
          go test -v ./... -coverprofile=coverage
          go tool cover -html=coverage -o coverage.html
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-Linux
          path: coverage.html

  test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Install ImageMagick and libvips
        run: |
          choco install -y imagemagick vips
      - name: Run tests
        run: |
          go test -v ./... -coverprofile=coverage
          go tool cover -html=coverage -o coverage.html
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-Windows
          path: coverage.html

  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Install ImageMagick and libvips
        run: |
          brew install imagemagick vips
      - name: Run tests
        run: |
          go test -v ./... -coverprofile=coverage
          go tool cover -html=coverage -o coverage.html
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-macOS
          path: coverage.html
